<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LED CONTROL - MIAUW</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <h1 class="logo">
          <i class="fas fa-microchip"></i> BUZZER<span> DETECTOR</span>
        </h1>
        <div id="connection-status" class="status-box disconnected">
          <i id="status-icon" class="fas fa-plug-circle-xmark"></i>
          <span id="status-text">Disconnected</span>
        </div>
      </div>
    </nav>

    <main class="dashboard-body">
      <div class="container-cards">
        <div class="control-card sensor-card">
          <div class="card-icon">
            <i class="fas fa-ruler-vertical"></i>
          </div>
          <h3>Jarak Objek</h3>
          <div class="distance-display">
            <span id="distance-value">0.00</span> <small>cm</small>
          </div>
          <p id="distance-status">Membaca data...</p>

          <div id="buzzer-indicator" class="buzzer-status inactive">
            <i class="fas fa-volume-up"></i> BUZZER:
            <span id="buzzer-text">OFF</span>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"
      type="text/javascript"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
